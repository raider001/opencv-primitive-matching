# JUnit 5 parallel execution configuration
#
# Classes run concurrently (VectorMatchingTest and CrossRejectDiagnosticTest in parallel).
# Methods within each class default to same_thread (sequential), but individual classes
# may opt in to method-level parallelism via @Execution(CONCURRENT).
# VectorMatchingTest uses @Execution(CONCURRENT): its shared report/diagnostic state
# (MatchReportLibrary, MatchDiagnosticLibrary) is backed by CopyOnWriteArrayList.

junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent


